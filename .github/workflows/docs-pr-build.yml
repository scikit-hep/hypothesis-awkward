name: Build docs preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  SITE_DIR: /tmp/built-site

concurrency:
  group: docs-build-pr-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0

      # Reference the action from @main so the build scripts (action.yml and
      # prepare_pr_build.py) always come from the trusted main branch, not from
      # the PR's checkout.
      - uses: scikit-hep/hypothesis-awkward/.github/actions/build-docs@main
        id: build
        with:
          subdir: pr/${{ github.event.number }}
          site-dir: ${{ env.SITE_DIR }}

      - uses: actions/upload-artifact@v7
        with:
          name: docs-preview
          path: ${{ env.SITE_DIR }}
          retention-days: 1

      - name: Save PR number
        run: echo "${{ github.event.number }}" > "$RUNNER_TEMP/pr-number"

      - uses: actions/upload-artifact@v7
        with:
          name: pr-metadata
          path: ${{ runner.temp }}/pr-number
          retention-days: 1
