name: Deploy release docs

on:
  workflow_run:
    workflows: ["Generate changelog"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: docs-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout release tag
        id: checkout
        uses: TaiSakuma/checkout-version-tag@v1
        with:
          trigger-tag: ${{ github.event.workflow_run.head_branch }}

      - name: Extract version
        id: version
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
        env:
          TAG: ${{ steps.checkout.outputs.release-tag }}

      - uses: astral-sh/setup-uv@v8.0.0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch gh-pages
        run: git fetch origin gh-pages

      - name: Deploy release docs
        run: |
          uv run --group docs mike deploy --push \
            --branch gh-pages \
            --update-aliases \
            "${{ steps.version.outputs.version }}" latest

      - name: Ensure default alias
        run: uv run --group docs mike set-default --push --branch gh-pages latest
