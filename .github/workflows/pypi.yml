name: Upload to PyPI

# Publish to PyPI after the "Generate changelog" workflow succeeds.
# This is part of the two-tag release flow (see changelog.yml).

on:
  workflow_run:
    workflows: ["Generate changelog"]
    types: [completed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Determine version tag
        id: version
        run: |
          echo "tag=v${GITHUB_EVENT_WORKFLOW_RUN_HEAD_BRANCH#u}" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_EVENT_WORKFLOW_RUN_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ steps.version.outputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install packages
        run: |
          pip install --upgrade pip
          pip install --upgrade hatch

      - name: Build
        run: hatch build

      - name: pypi-publish
        uses: pypa/gh-action-pypi-publish@release/v1
