name: Release a new version

# Create a GitHub Release after the "Generate changelog" workflow succeeds,
# then update the `latest` tag to point at the new release commit.
#
# This is the second half of the two-tag release flow (see changelog.yml).

on:
  workflow_run:
    workflows: ["Generate changelog"]
    types: [completed]

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write

    steps:
      # workflow_run events don't set GITHUB_REF to the tag; the trigger tag
      # is available via head_branch instead. Transform u1.2.3 → v1.2.3.
      - name: Determine version tag
        id: version
        run: |
          echo "tag=v${GITHUB_EVENT_WORKFLOW_RUN_HEAD_BRANCH#u}" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_EVENT_WORKFLOW_RUN_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.version.outputs.tag }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.version.outputs.tag }} \
            --generate-notes

      # Maintain a rolling `latest` tag so users can always reference the
      # most recent release (e.g., in install instructions).
      - name: Tag latest
        uses: EndBug/latest-tag@v1
