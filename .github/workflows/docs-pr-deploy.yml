name: Deploy docs preview

on:
  workflow_run:
    workflows: ["Build docs preview"]
    types: [completed]

concurrency:
  group: docs-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      actions: read
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}

      - uses: actions/download-artifact@v8
        with:
          name: pr-metadata
          path: ${{ runner.temp }}/pr-metadata
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Read and validate PR number
        id: pr
        run: |
          raw="$(cat "$RUNNER_TEMP/pr-metadata/pr-number")"
          if ! [[ "$raw" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error::Invalid PR number"
            exit 1
          fi
          echo "number=$raw" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v8
        with:
          name: docs-preview
          path: /tmp/built-site
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - uses: ./.github/actions/deploy-to-gh-pages
        id: deploy
        with:
          site-dir: /tmp/built-site
          target: pr/${{ steps.pr.outputs.number }}
          commit-message: "Deploy PR #${{ steps.pr.outputs.number }} preview"

      - name: Wait for deployment
        id: wait
        uses: actions/github-script@v9
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
        with:
          script: |
            const url = process.env.DEPLOY_URL;
            const maxAttempts = 30;
            const intervalMs = 10_000;
            for (let i = 0; i < maxAttempts; i++) {
              try {
                const res = await fetch(url);
                if (res.ok) { core.setOutput('live', 'true'); return; }
              } catch (e) {}
              await new Promise(r => setTimeout(r, intervalMs));
            }
            core.setOutput('live', 'false');

      - name: Post or update PR comment
        uses: actions/github-script@v9
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
          DEPLOY_LIVE: ${{ steps.wait.outputs.live }}
        with:
          script: |
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            const url = process.env.DEPLOY_URL;
            const marker = '<!-- docs-preview -->';
            const status = process.env.DEPLOY_LIVE === 'true' ? '' : '\n\n> **Note:** The preview may not be ready yet.';
            const body = `${marker}\n📖 Docs preview: ${url}${status}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
