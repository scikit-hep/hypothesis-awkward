name: Run nightly tests

on:
  schedule:
    - cron: "34 3 * * *"

  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHONUNBUFFERED: "1"
  FORCE_COLOR: "1"
  PIP_PROGRESS_BAR: "off"

jobs:
  run:
    name: >
      Py${{ matrix.python-version }}
      (${{ matrix.deps }} deps)
      on Linux
    if: github.event_name != 'schedule' || github.repository_owner == 'scikit-hep'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        deps: [latest, min]
        python-version: ["3.10", "3.14"]

    steps:
      - uses: actions/checkout@v7

      - name: Install uv and set the Python version
        uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create uv virtual environment
        run: uv venv

      - name: Install packages (latest)
        # Latest versions of dependencies monitored by Dependabot
        if: matrix.deps == 'latest'
        run: |
          uv pip install -e . --group dev
          uv pip install -r .github-deps/latest/requirements.txt

      - name: Install packages (minimum)
        # Oldest supported versions of dependencies in `pyproject.toml`
        if: matrix.deps == 'min'
        run: |
          uv pip install -e . --group dev
          uv pip install -r .github-deps/minimum/requirements.txt

      - name: List installed packages
        run: uv pip list

      - name: Run tests
        run: uv run --no-sync pytest -vv -rs --hypothesis-show-statistics
        env:
          HYPOTHESIS_PROFILE: nightly
