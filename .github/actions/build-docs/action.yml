name: Build docs (PR preview)
description: Build docs for a PR preview subdirectory, without the mike version selector

inputs:
  subdir:
    description: Subdirectory to deploy to (e.g., pr/3)
    required: true
  site-dir:
    description: Output directory for the built site
    default: /tmp/built-site

outputs:
  site-dir:
    description: Path to the built site
    value: ${{ inputs.site-dir }}

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        # Update site_url and drop the mike version provider.
        uv run --group docs python "${{ github.action_path }}/prepare_pr_build.py" "${{ inputs.subdir }}"

        # Build the docs.
        uv run --group docs zensical build --clean

        # Move the docs to the output directory.
        mv site "${{ inputs.site-dir }}"

        # Leave the working directory clean for the next action.
        git checkout -- .
