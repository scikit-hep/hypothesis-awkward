name: Update index.html
description: Regenerate index.html, commit and push

inputs:
  repo-name:
    description: Repository name for the index page title
    required: true
  repo-url:
    description: Repository URL for the GitHub link
    required: true

runs:
  using: composite
  steps:
    # Create a worktree for gh-pages.
    - shell: bash
      run: |
        if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
          git fetch origin gh-pages
          git worktree add -B gh-pages /tmp/gh-pages origin/gh-pages
        else
          git worktree add --orphan -b gh-pages /tmp/gh-pages
        fi

    # Generate index.html, commit, and push.
    - shell: bash
      run: |
        cd /tmp/gh-pages
        uv run --project "$GITHUB_WORKSPACE" --group docs python "${{ github.action_path }}/generate_index.py" \
          "${{ inputs.repo-name }}" \
          "${{ inputs.repo-url }}"
        git add index.html
        git diff --cached --quiet || git commit -m "Update index.html"
        git push origin gh-pages

    # Clean up the worktree.
    - shell: bash
      run: git worktree remove /tmp/gh-pages
