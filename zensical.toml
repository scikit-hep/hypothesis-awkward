[project]
site_name = "hypothesis-awkward"
site_description = "Hypothesis strategies for Awkward Array"
site_author = "Tai Sakuma"
site_url = "https://scikit-hep.github.io/hypothesis-awkward/"
copyright = "Copyright &copy; 2026 Tai Sakuma"
nav = [
    { "Home" = "index.md" },
    { "Guide" = [
        { "Overview" = "guide/index.md" },
        { "Installation" = "guide/installation.md" },
        { "Getting Started" = "guide/getting-started.md" },
    ] },
    { "API Reference" = [
        { "Overview" = "reference/index.md" },
        { "Strategies" = [
            { "Constructors" = "reference/strategies/constructors.md" },
            { "Contents" = "reference/strategies/contents.md" },
            { "NumPy" = "reference/strategies/numpy.md" },
            { "Builtins" = "reference/strategies/builtins.md" },
        ] },
        { "Util" = [
            { "Util" = "reference/util.md" },
        ] },
    ] },
]
extra_css = ["stylesheets/extra.css"]
extra_javascript = ["javascripts/extra.js"]

[project.theme]
# variant = "classic"
custom_dir = "overrides"
# favicon = "images/favicon.png"
language = "en"
features = [
    "announce.dismiss",
    # "content.action.edit",
    # "content.action.view",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    # "header.autohide",
    # "navigation.expand",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.instant.progress",
    "navigation.path",
    # "navigation.prune",
    "navigation.sections",
    "navigation.tabs",
    "navigation.tabs.sticky",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
    "toc.follow",
    # "toc.integrate",
]
# logo = "assets/logo.png"

# [project.theme.icon]
# logo = "lucide/smile"

# [project.theme.font]
# text = "Inter"
# code = "Jetbrains Mono"

[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to system preference"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/scikit-hep/hypothesis-awkward"

[[project.extra.social]]
icon = "fontawesome/brands/python"
link = "https://pypi.org/project/hypothesis-awkward/"

[project.extra.version]
provider = "mike"
default = ["latest", "dev"]

[project.plugins.mkdocstrings.handlers.python]
inventories = [
    "https://docs.python.org/3/objects.inv",
    "https://hypothesis.readthedocs.io/en/latest/objects.inv",
    "https://numpy.org/doc/stable/objects.inv",
]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "auto"
members_order = ["__all__", "source"]
summary = { modules = false, functions = true, classes = true, attributes = true, type_aliases = true }
show_source = false
show_root_heading = false
show_root_toc_entry = false
separate_signature = true
show_signature_annotations = true


[project.plugins.mkdocstrings.handlers.python.options.docstring_options]
method = "heuristics"
style_order = ["numpy", "google", "sphinx"]
default = "numpy"
