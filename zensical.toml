[project]
site_name = "hypothesis-awkward API reference"
site_description = "Hypothesis strategies for Awkward Array"
site_author = "Tai Sakuma"
site_url = "https://scikit-hep.github.io/hypothesis-awkward/"
copyright = "Copyright &copy; 2026 Tai Sakuma"
nav = [
    { "Home" = "index.md" },
    { "Strategies" = [
        { "Constructors" = "strategies/constructors.md" },
        { "Contents" = "strategies/contents.md" },
        { "NumPy" = "strategies/numpy.md" },
        { "Builtins" = "strategies/builtins.md" },
    ] },
]
# extra_css = ["stylesheets/extra.css"]
# extra_javascript = ["javascripts/extra.js"]

[project.theme]
# variant = "classic"
# custom_dir = "overrides"
# favicon = "images/favicon.png"
language = "en"
features = [
    "announce.dismiss",
    # "content.action.edit",
    # "content.action.view",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    # "header.autohide",
    # "navigation.expand",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.instant.progress",
    "navigation.path",
    # "navigation.prune",
    "navigation.sections",
    # "navigation.tabs",
    # "navigation.tabs.sticky",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
    "toc.follow",
    # "toc.integrate",
]
# logo = "assets/logo.png"

# [project.theme.icon]
# logo = "lucide/smile"

# [project.theme.font]
# text = "Inter"
# code = "Jetbrains Mono"

[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to system preference"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/scikit-hep/hypothesis-awkward"

[project.plugins.mkdocstrings.handlers.python]
inventories = ["https://docs.python.org/3/objects.inv"]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "auto"
inherited_members = true
show_source = false

[project.plugins.mkdocstrings.handlers.python.options.docstring_options]
method = "heuristics"
style_order = ["numpy", "google", "sphinx"]
default = "numpy"
